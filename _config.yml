title: California Solar Adoption & Grid Evolution (2015–2023)
author: Adrian Nie
copyright: "2026"

format: jb-book

execute:
  execute_notebooks: "off"  # Notebooks already run; no need to re-execute

html:
  use_issues_button: false
  use_repository_button: false

parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - dollarmath

latex:
  latex_engine: pdflatex
  latex_documents:
    targetname: book.tex
